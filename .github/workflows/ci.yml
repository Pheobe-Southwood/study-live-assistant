name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-build:
    name: Test and build on Windows
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Restore
        run: dotnet restore StudyLiveAssistant.sln

      - name: Test
        run: dotnet test StudyLiveAssistant.sln --configuration Release --no-restore --logger "trx;LogFileName=tests.trx" --results-directory TestResults

      - name: Build WPF application
        run: dotnet build src/StudyLiveAssistant.App/StudyLiveAssistant.App.csproj --configuration Release --no-restore

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: TestResults/*.trx
          if-no-files-found: warn
          retention-days: 14
