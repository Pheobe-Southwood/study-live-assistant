name: Bug 报告
description: 报告可复现的问题
title: "[Bug] "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 请说明发生了什么，以及你预期的行为。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: "1. 打开……\n2. 点击……\n3. 出现……"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 应用版本
      placeholder: v0.1.0
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows 版本
      placeholder: Windows 11 24H2
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 日志或截图
      description: 日志位于 %LocalAppData%\StudyLiveAssistant\Logs，请先检查并移除不希望公开的信息。
